services:
  # PostgreSQL for Prefect server (avoids SQLite "database is locked" under load)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - prefect_postgres_data:/var/lib/postgresql/data
    networks:
      - prefect-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect -d prefect"]
      interval: 5s
      timeout: 5s
      retries: 5
  # Service to run the Prefect server, UI, and API
  # Use Prefect 2.x to match the flow-runner (pip install prefect in mdx2 image).
  # Prefect 3 server uses a different event-stream protocol and breaks the runner connection.
  prefect-server:
    image: prefecthq/prefect:2.20-python3.11
    command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
    ports:
      # Map container port 4200 to host port 4200 for UI access
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
      - PREFECT_UI_API_URL=http://localhost:4200/api
      # Use PostgreSQL to avoid SQLite "database is locked" errors
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
    networks:
      - prefect-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: # Ensures services start in correct order
      # This uses Python's standard library to check the health endpoint
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health').getcode()"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # Service to run Prefect flows with mdx2 CLI commands
  # Uses the mdx2 container which has all dependencies (micromamba, mdx2, Prefect)
  flow-runner:
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /home/dev
    volumes:
      # Mount parent directory so sibling directories are accessible
      - ..:/home/workspace
      # Mount raw data root so symlinks in raw_data/ resolve (e.g. raw_data/insulin -> /mnt/chess/20260218/insulin)
      # Adjust the host path if your symlinks point elsewhere.
      - /mnt/chess:/mnt/chess
      - .:/home/dev
    environment:
      # NOTE: use the service name 'prefect-server' as the hostname
      - PREFECT_API_URL=http://prefect-server:4200/api
    networks:
      - prefect-net
    depends_on:
      prefect-server:
        condition: service_healthy # Wait for the server to be healthy
    # Serve the mdx2 Prefect flows as deployments
    # Using sh -c to activate conda env and add a small delay to ensure server is fully ready
    command: ["sh", "-c", "sleep 5 && micromamba run -n mdx2-dev python prefect/prefect_flows.py"]
    restart: unless-stopped
  # Service built from the local Dockerfile in this directory for manual running of mdx2 commands
  container:
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /home/dev
    environment:
      # mdx2 is at /home/dev/mdx2 when project root is mounted; pip editable install expects build-time path
      - PYTHONPATH=/home/dev/mdx2
      # Use shared Prefect server (avoids starting an ephemeral server when running pipeline with --mode prefect)
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - ..:/home/workspace
      # Mount raw data root so symlinks in raw_data/ resolve inside the container
      - /mnt/chess:/mnt/chess
      # Mount project root (CHESS_20260218) to /home/dev when running from project root
      - ..:/home/dev
    ports:
      - "8888:8888"
    networks:
      - prefect-net
    # Keep container running so we can exec into it
    command: ["tail", "-f", "/dev/null"]
networks:
  prefect-net:
    driver: bridge

volumes:
  prefect_postgres_data:
